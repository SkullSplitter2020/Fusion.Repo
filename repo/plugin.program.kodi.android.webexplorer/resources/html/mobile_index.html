<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kodi Android Web File Explorer © André Albus – Mobile</title>
<style>
:root{
  --bg:#f7f8fa;
  --card:#fff;
  --muted:#6b6b6b;
  --border:#e6e7ea;
  --accent:#1e88e5;
  --btn-bg:#f3f5f7;
  --danger:#d9534f;
  --ok:#2e7d32;
  --shadow:0 8px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box}
html,body{
  height:100%;
}
body{
  margin:8px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:#222;
}
.header{
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-bottom:8px;
}
h1{
  font-size:15px;
  margin:0;
}
.server-info{
  font-size:13px;
  color:var(--muted);
}
.controls{
  display:flex;
  flex-wrap:wrap;
  align-items:flex-start;
  gap:6px;
  margin-bottom:8px;
}
.btn{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--btn-bg);
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  min-width:0;
}
.btn[disabled]{
  opacity:.6;
  cursor:default;
}
.btn-danger{
  border-color:rgba(217,83,79,0.9);
  background:rgba(217,83,79,0.06);
  color:var(--danger);
}
.filelist.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow);
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid var(--border);
}
.row:last-child{border-bottom:none}
.filename{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
  flex:1;
}
.thumb{
  width:42px;
  height:42px;
  object-fit:cover;
  border-radius:6px;
  border:1px solid var(--border);
  flex-shrink:0;
}
.name{
  font-size:15px;
  min-width:0;
  flex:1;
  max-width:none;
  position:relative;
  overflow:hidden;
}
.name-inner{
  display:inline-block;
  white-space:nowrap;
  will-change:transform;
}
.name.marquee:hover .name-inner{
  animation:marquee 10s linear infinite;
}
@keyframes marquee{
  0%{transform:translateX(0)}
  30%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
.meta{
  font-size:12px;
  color:var(--muted);
}
.dir{
  font-weight:600;
  color:var(--accent);
  cursor:pointer;
}
.actions{
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
.menu-wrap{position:relative}
.menu-btn{
  padding:6px 8px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  font-size:18px;
  line-height:1;
  cursor:pointer;
}
.menu{
  position:fixed;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow);
  display:none;
  min-width:200px;
  overflow:hidden;
  z-index:9999;
}
.menu.open{display:block}
.menu .mi{
  padding:10px 12px;
  font-size:14px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  user-select:none;
}
.menu .mi:last-child{border-bottom:none}
.menu .mi:active{background:#f0f2f5}
.menu .mi.danger{color:var(--danger)}

.progress-wrap{
  margin-top:8px;
  display:none;
}
.progress-row{
  display:flex;
  align-items:center;
  gap:8px;
}
progress{
  flex:1;
  width:100%;
  height:14px;
  border-radius:10px;
  background:#eee;
  appearance:none;
}
progress::-webkit-progress-bar{background:#eee}
progress::-webkit-progress-value{background:linear-gradient(90deg,var(--accent),#0b63c2)}
.transfer-info{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

.footer{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* Toasts */
.toast-wrap{
  position:fixed;
  right:8px;
  bottom:8px;
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:10000;
}
.toast{
  background:var(--card);
  border:1px solid var(--border);
  border-left:4px solid var(--accent);
  padding:8px 10px;
  border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  min-width:180px;
  font-size:13px;
}
.toast.ok{border-left-color:var(--ok)}
.toast.err{border-left-color:var(--danger)}

/* Modals */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9998;
}
.modal-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  width:96vw;
  max-height:92vh;
  box-shadow:0 2px 16px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:hidden;
  margin:auto;
}
.modal h3{
  margin:0;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
}

/* Titel mit Marquee (Editor + Media) */
.modal h3 .title-name{
  flex:1;
  min-width:0;
  overflow:hidden;
  position:relative;
}
.modal h3 .title-name-inner{
  display:inline-block;
  white-space:nowrap;
  will-change:transform;
}
.modal h3 .title-name.marquee .title-name-inner{
  animation:marquee 10s linear infinite;
}

/* Editor content */
#editorContent{
  width:100%;
  min-height:220px;
  max-height:60vh;
  resize:vertical;
  background:#0b1020;
  color:#e4e9ff;
  padding:8px;
  border-radius:6px;
  border:1px solid var(--border);
  font-family:SFMono-Regular,Consolas,Menlo,monospace;
  font-size:13px;
  box-sizing:border-box;
}
/* Editor: allow horizontal scrolling instead of wrapping */
.CodeMirror{ height:100%; overflow:auto; }
/* Preserve long lines inside the editor so horizontal scroll appears */
.CodeMirror pre{ white-space:pre; }

/* Buttons-Leisten */
.buttons{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:flex-end;
  margin-top:4px;
}
/* Editor-Buttons – optimiert für Mobile & Desktop */
.editor-buttons{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  margin-top:auto;          /* schiebt Buttons im Vollbild nach unten */
  padding-top:8px;          /* Abstand zum Editor */
}

.editor-buttons .buttons-left,
.editor-buttons .buttons-right{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* Fix: Buttons im Vollbild nicht überdecken lassen */
.modal-card.editor-full .editor-buttons{
  background:var(--card);
  position:relative;
  z-index:5;
  padding-bottom:env(safe-area-inset-bottom, 10px); /* Mobile: Abstand zur Navigation */
}

/* Fullscreen Editor */
.modal-card.editor-full {
  width:100vw;
  max-width:none;
  height:calc(100vh - env(safe-area-inset-bottom, 0px));
  max-height:none;
  border-radius:0;
  padding:8px;
  padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 12px);
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.modal-card.editor-full #editorContent,
.modal-card.editor-full .CodeMirror{
  flex:1;
  min-height:0;
  height:100%;
  max-height:none;
}

/* Media content */
#mediaContainer img{
  max-width:100%;
  max-height:80vh;
  display:block;
  margin:0 auto;
}
#mediaContainer video,
#mediaContainer audio{
  width:100%;
  max-height:80vh;
  display:block;
}
.media-buttons{
  justify-content:space-between;
}
.media-buttons .buttons-left,
.media-buttons .buttons-right{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* Fullscreen Media */
.modal-card.media-full{
  width:100vw;
  height:100vh;
  max-height:none;
  border-radius:0;
  padding:8px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}
.modal-card.media-full #mediaContainer{
  flex:1;
  max-height:none;
}

/* Destructive buttons */
.button.danger, .btn.danger, .btn.btn-danger {
  background: linear-gradient(180deg, #ff6b6b, #e04444);
  color: #fff;
  box-shadow: 0 6px 18px rgba(224,68,68,0.18);
  border: 1px solid rgba(0,0,0,0.06);
}
.button.danger:active, .btn.danger:active, .btn.btn-danger:active {
  transform: scale(0.99);
}
.button.danger.ghost, .btn.danger.ghost {
  background: transparent;
  color: #e04444;
  border: 1px solid rgba(224,68,68,0.12);
  box-shadow:none;
}

@media (min-width:641px){
  body{margin:12px;}
}
</style>

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<style>
/* =========================================================
   UI SAFETY & FULLSCREEN FIXES
   - No JS or endpoint changes
   - CSS-only, additive, non-destructive
   ========================================================= */

/* Ensure the document can respect dynamic viewport height on mobile */
html, body {
  height: 100%;
}

/* Prefer dynamic viewport units where supported (Android / modern browsers) */
@supports (height: 100dvh) {
  .app,
  .main,
  .viewer,
  .editor,
  .fullscreen,
  body {
    min-height: 100dvh;
  }
}

/* True fullscreen behavior for images and videos */
img:fullscreen,
video:fullscreen {
  width: 100vw !important;
  height: 100vh !important;
  max-width: 100vw !important;
  max-height: 100vh !important;
  object-fit: contain;
  margin: 0;
  padding: 0;
  background: #000;
}

/* Generic fullscreen container safety */
:fullscreen {
  width: 100vw !important;
  height: 100vh !important;
}

/* Prevent bottom UI elements from being hidden behind system navigation bars */
.safe-bottom,
.footer,
.toolbar,
.controls,
.editor-actions {
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}

/* Fallback: ensure body content never touches the unsafe bottom edge */
body {
  padding-bottom: env(safe-area-inset-bottom);
}

</style>
</head>
<body>
  <div class="header">
    <h1>Kodi Android Web File Explorer © André Albus – Mobile</h1>
    <div class="server-info">
      <strong id="rootLabel">Android Root</strong>: <span id="pathDisplay">/</span>
    </div>
  </div>

  <div class="controls">
    <button id="rootAndroid" class="btn">Android Root</button>
    <button id="rootKodi" class="btn">Kodi Root</button>
    <button id="uploadBtn" class="btn" title="Datei hochladen. ZIP-Archive: Wahl zwischen Entpacken oder Nur hochladen.">Datei hochladen</button>
    <button id="zipNoRootBtn" class="btn" title="Inhalt des aktuellen Verzeichnisses als ZIP herunterladen (ohne Hauptordner)">Verzeichnis Inhalt ZIP Download</button>
    <button id="clearDirBtn" class="btn btn-danger" title="Rekursiv nur den Inhalt dieses Verzeichnisses löschen">Verzeichnis Inhalt löschen</button>
    <button id="pasteBtn" class="btn" title="In aktuelles Verzeichnis einfügen" disabled>Einfügen</button>
  </div>

  <div class="filelist card" id="filelistCard" aria-live="polite">
    <div id="filelist"></div>
  </div>

  <div class="progress-wrap" id="transferArea">
    <div class="progress-row">
      <progress id="transferProgress" value="0" max="100"></progress>
      <button id="cancelBtn" class="btn btn-danger" title="Laufenden Vorgang abbrechen" style="display:none;">Abbrechen</button>
    </div>
    <div class="transfer-info"><span id="transferPercent"></span></div>
  </div>

  <div class="footer">
    <button id="quitBtn" class="btn btn-danger">Kodi beenden</button>
    <button id="appinfoBtn" class="btn">App-Info öffnen</button>
    <button id="closeServerBtn" class="btn" title="Webserver beenden">Server schließen</button>
  </div>

  <!-- Upload-Dialog für ZIP -->
  <div class="modal" id="zipUploadChoice">
    <div class="modal-card">
      <h3>ZIP-Upload</h3>
      <div>Wie soll die ZIP-Datei verarbeitet werden?</div>
      <div class="buttons">
        <button id="zipChoiceUnpack" class="btn" style="background:#1e88e5;color:#fff">Sofort entpacken</button>
        <button id="zipChoiceOnly" class="btn">Nur hochladen</button>
        <button id="zipChoiceCancel" class="btn btn-danger">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Editor-Modal -->
  <div class="modal" id="editorModal">
    <div class="modal-card" id="editorCard">
      <h3 id="editorTitle">
        <span class="title-name"><span class="title-name-inner">Datei öffnen</span></span>
      </h3>
      <textarea id="editorContent" spellcheck="false"></textarea>
      <div class="buttons editor-buttons">
        <div class="buttons-left">
          <button id="editorCancel" class="btn">Abbrechen</button>
        </div>
        <div class="buttons-right">
          <button id="editorFullscreen" class="btn" type="button" title="Editor Vollbild umschalten">Vollbild</button>
          <button id="editorSave" class="btn" title="Änderungen speichern">Speichern</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Media-Modal -->
  <div class="modal" id="mediaModal">
    <div class="modal-card" id="mediaCard">
      <h3 id="mediaTitle">
        <span class="title-name"><span class="title-name-inner">Medienwiedergabe</span></span>
      </h3>
      <div id="mediaContainer"></div>
      <div class="buttons media-buttons">
        <div class="buttons-left">
          <button id="mediaClose" class="btn">Schließen</button>
        </div>
        <div class="buttons-right">
          <button id="mediaFullscreen" class="btn" type="button" title="Medienfenster Vollbild umschalten">Vollbild</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

<script>
(async function(){
  const rootLabel = document.getElementById('rootLabel');
  const pathDisplay = document.getElementById('pathDisplay');
  const filelistEl = document.getElementById('filelist');
  const uploadBtn = document.getElementById('uploadBtn');
  const rootAndroid = document.getElementById('rootAndroid');
  const rootKodi = document.getElementById('rootKodi');
  const quitBtn = document.getElementById('quitBtn');
  const appinfoBtn = document.getElementById('appinfoBtn');
  const closeServerBtn = document.getElementById('closeServerBtn');
  const transferArea = document.getElementById('transferArea');
  const transferProgress = document.getElementById('transferProgress');
  const transferPercent = document.getElementById('transferPercent');
  const cancelBtn = document.getElementById('cancelBtn');
  const zipNoRootBtn = document.getElementById('zipNoRootBtn');
  const clearDirBtn = document.getElementById('clearDirBtn');
  const pasteBtn = document.getElementById('pasteBtn');

  const zipDialog = document.getElementById('zipUploadChoice');
  const zipChoiceUnpack = document.getElementById('zipChoiceUnpack');
  const zipChoiceOnly = document.getElementById('zipChoiceOnly');
  const zipChoiceCancel = document.getElementById('zipChoiceCancel');

  const toastWrap = document.getElementById('toastWrap');

  const editorModal = document.getElementById('editorModal');
  const editorCard = document.getElementById('editorCard');
  const editorTitle = document.getElementById('editorTitle');
  const editorContent = document.getElementById('editorContent');
  const editorSave = document.getElementById('editorSave');
  const editorCancel = document.getElementById('editorCancel');
  const editorFullscreen = document.getElementById('editorFullscreen');

  const mediaModal = document.getElementById('mediaModal');
  const mediaCard = document.getElementById('mediaCard');
  const mediaTitle = document.getElementById('mediaTitle');
  const mediaContainer = document.getElementById('mediaContainer');
  const mediaClose = document.getElementById('mediaClose');
  const mediaFullscreen = document.getElementById('mediaFullscreen');

  let currentPath = '';
  let currentRootName = 'Android';
  let activeTransfer = false;
  let clipHas = false;
  let clipName = '';
  let pendingZipFile = null;
  let currentTask = null;

  let editorRelpath = null;
  let editorFilename = null;
  let editorDirPath = '';
  let cmEditor = null;
  let editorFull = false;
  let mediaFull = false;

  const floatingMenu = document.createElement('div');
  floatingMenu.className = 'menu';
  document.body.appendChild(floatingMenu);
  let menuAnchorBtn = null;

  const READABLE_EXT = [
    '.txt','.log','.xml','.json','.nfo','.ini','.cfg',
    '.py','.pyw','.js','.ts','.css','.html','.htm',
    '.md','.sh','.bat','.yml','.yaml','.toml',
    '.m3u','.m3u8','.pls',
    '.po','.pot',
    '.properties','.strm','.conf','.service','.desktop','.list',
    '.csv','.tsv','.env','.sql','.graphql','.tex','.rst'
  ];

  const IMAGE_EXT = ['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg'];
  const VIDEO_EXT = ['.mp4','.mkv','.webm','.avi','.mov','.flv','.wmv','.m4v'];
  const AUDIO_EXT = ['.mp3','.flac','.ogg','.wav','.m4a','.aac'];
  const MAX_VIEW_BYTES = 2 * 1024 * 1024;

  function isReadableName(name){
    if(!name) return false;
    const lower = name.toLowerCase();
    return READABLE_EXT.some(ext => lower.endsWith(ext));
  }
  function isImageName(name){
    if(!name) return false;
    const lower = name.toLowerCase();
    return IMAGE_EXT.some(ext => lower.endsWith(ext));
  }
  function isVideoName(name){
    if(!name) return false;
    const lower = name.toLowerCase();
    return VIDEO_EXT.some(ext => lower.endsWith(ext));
  }
  function isAudioName(name){
    if(!name) return false;
    const lower = name.toLowerCase();
    return AUDIO_EXT.some(ext => lower.endsWith(ext));
  }

  function toast(msg, type='ok', timeout=3000){
    const d = document.createElement('div');
    d.className = 'toast ' + (type === 'error' || type==='err' ? 'err' : 'ok');
    d.textContent = msg;
    toastWrap.appendChild(d);
    setTimeout(()=>{ d.style.opacity='0'; d.style.transform='translateY(4px)'; }, timeout);
    setTimeout(()=>{ d.remove(); }, timeout+500);
  }

  function humanSize(n){
    if(!n || n<=0) return '0 B';
    const k=1024, units=['B','KB','MB','GB','TB'];
    const i = Math.floor(Math.log(n)/Math.log(k));
    const v = n/Math.pow(k,i);
    return (v>=100? v.toFixed(0): v>=10? v.toFixed(1): v.toFixed(2)) + ' ' + units[i];
  }

  function yieldFrame(){ return new Promise(r => setTimeout(r,0)); }

  function setPathDisplay(){
    const disp = currentPath ? ('/' + currentPath) : '/';
    rootLabel.textContent = (currentRootName === 'Kodi' ? 'Kodi Root' : 'Android Root');
    pathDisplay.textContent = disp;
  }

  function setPasteState(has, name){
    clipHas = !!has;
    clipName = name || '';
    pasteBtn.disabled = !clipHas;
    pasteBtn.title = clipHas ? ('Einfügen: ' + clipName) : 'Zwischenablage leer';
  }

  function setBusy(on, label){
    activeTransfer = !!on;
    const disable = on;
    [uploadBtn, zipNoRootBtn, clearDirBtn, pasteBtn, rootAndroid, rootKodi, closeServerBtn]
      .forEach(b => { if(b) b.disabled = disable; });
    transferArea.style.display = on ? 'block' : 'none';
    cancelBtn.style.display = on ? 'inline-block' : 'none';
    if(on){
      transferPercent.textContent = label || '';
      try { transferProgress.removeAttribute('value'); } catch(_){}
    }else{
      transferProgress.max = 100;
      transferProgress.value = 0;
      transferPercent.textContent = '';
      pasteBtn.disabled = !clipHas;
      currentTask = null;
      cancelBtn.style.display = 'none';
    }
  }

  function closeMenu(){
    floatingMenu.classList.remove('open');
    floatingMenu.style.display = 'none';
    menuAnchorBtn = null;
  }

  function openMenuFor(btn, items){
    floatingMenu.innerHTML = '';
    items.forEach(x => {
      const mi = document.createElement('div');
      mi.className = 'mi' + (x.danger ? ' danger' : '');
      mi.textContent = x.label;
      mi.onclick = async (e) => {
        e.stopPropagation();
        closeMenu();
        await x.onClick();
      };
      floatingMenu.appendChild(mi);
    });
    floatingMenu.style.display = 'block';
    floatingMenu.classList.add('open');
    const rect = btn.getBoundingClientRect();
    const menuRect = floatingMenu.getBoundingClientRect();
    const margin = 6;
    let top = rect.bottom + margin;
    let left = Math.min(window.innerWidth - menuRect.width - margin, rect.right - menuRect.width);
    if (top + menuRect.height > window.innerHeight - margin) {
      top = Math.max(margin, rect.top - margin - menuRect.height);
    }
    if (left < margin) left = margin;
    floatingMenu.style.top = `${Math.round(top)}px`;
    floatingMenu.style.left = `${Math.round(left)}px`;
    menuAnchorBtn = btn;
  }

  document.addEventListener('click', () => closeMenu(), {passive:true});
  window.addEventListener('scroll', () => closeMenu(), {passive:true});
  window.addEventListener('resize', () => closeMenu());

  function getModeFromFilename(name){
    if(!name) return 'text/plain';
    const lower = name.toLowerCase();
    if(lower.endsWith('.js') || lower.endsWith('.ts')) return 'javascript';
    if(lower.endsWith('.py') || lower.endsWith('.pyw')) return 'python';
    if(lower.endsWith('.css')) return 'css';
    if(lower.endsWith('.html') || lower.endsWith('.htm') || lower.endsWith('.xml')) return 'xml';
    if(lower.endsWith('.md')) return 'markdown';
    if(lower.endsWith('.sh') || lower.endsWith('.bat')) return 'shell';
    return 'text/plain';
  }

  // Datei laden mit Fortschrittsanzeige + UTF-8 / ANSI-Fallback
  async function openFileForEdit(relpath, name){
    try{
      setBusy(true, 'Lese Datei...');
      const url = '/download?path=' + encodeURIComponent(relpath || '');
      const resp = await fetch(url);
      if(!resp.ok){
        const j = await resp.json().catch(()=> ({}));
        toast(j.message || 'Download fehlgeschlagen', 'error');
        return;
      }

      const len = parseInt(resp.headers.get('Content-Length') || '0', 10);
      if(len && len > MAX_VIEW_BYTES){
        toast('Datei zu groß zum Bearbeiten (' + humanSize(len) + ')', 'error');
        return;
      }

      if(!resp.body){
        const bytes = new Uint8Array(await resp.arrayBuffer());
        let text = '';
        try{
          const decUtf8 = new TextDecoder('utf-8', {fatal:true});
          text = decUtf8.decode(bytes);
        }catch(e){
          try{
            // Android unterstützt windows-1252 NICHT → sauber abfangen
            let dec1252 = null;
            try{
              dec1252 = new TextDecoder('windows-1252', {fatal:false});
            }catch(_){
              dec1252 = null;
            }

            if(dec1252){
              text = dec1252.decode(bytes);
            } else {
              // UTF‑8 tolerant (funktioniert immer)
              const decUtf8Lenient = new TextDecoder('utf-8', {fatal:false});
              text = decUtf8Lenient.decode(bytes);
            }

          }catch(e2){
            // letzter Fallback
            const decUtf8Lenient = new TextDecoder('utf-8', {fatal:false});
            text = decUtf8Lenient.decode(bytes);
          }
        }
        openEditor(name || 'Datei öffnen', text, relpath, name);
        return;
      }

      const reader = resp.body.getReader();
      const chunks = [];
      let received = 0;

      if(len > 0){
        transferProgress.max = 100;
      } else {
        transferProgress.removeAttribute('value');
      }

      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        chunks.push(value);
        received += value.length;

        if(!len && received > MAX_VIEW_BYTES){
          toast('Datei zu groß zum Bearbeiten (' + humanSize(received) + ')', 'error');
          try{ await reader.cancel(); }catch(_){}
          return;
        }

        if(len > 0){
          const pct = Math.min(100, Math.round((received/len)*100));
          transferProgress.value = pct;
          transferPercent.textContent = 'Lese Datei: ' + humanSize(received) + ' / ' + humanSize(len) + ' (' + pct + ' %)';
        } else {
          transferPercent.textContent = 'Lese Datei: ' + humanSize(received);
        }

        if((received & ((1<<20)-1)) === 0) await yieldFrame();
      }

      // Alle Chunks in einen Puffer zusammenführen
      let totalLen = 0;
      for(const c of chunks) totalLen += c.length;
      const bytes = new Uint8Array(totalLen);
      let off = 0;
      for(const c of chunks){
        bytes.set(c, off);
        off += c.length;
      }

      let text = '';
      try{
        const decUtf8 = new TextDecoder('utf-8', {fatal:true});
        text = decUtf8.decode(bytes);
      }catch(e){
        try{
          const dec1252 = new TextDecoder('windows-1252', {fatal:false});
          text = dec1252.decode(bytes);
        }catch(e2){
          const decUtf8Lenient = new TextDecoder('utf-8', {fatal:false});
          text = decUtf8Lenient.decode(bytes);
        }
      }

      openEditor(name || 'Datei öffnen', text, relpath, name);
    }catch(e){
      toast('Fehler beim Lesen der Datei', 'error');
      console.error(e);
    }finally{
      setBusy(false);
    }
  }

  function hasFSA(){
    try{
      return !!(window.showSaveFilePicker && window.isSecureContext);
    }catch(_){ return false; }
  }

  async function streamToFile(resp, suggestedName){
    const total = parseInt(resp.headers.get('Content-Length') || '0', 10);
    const hasTotal = total > 0;
    const fileHandle = await showSaveFilePicker({
      suggestedName,
      types: [{ description: 'Datei', accept: {'*/*': ['.*']} }]
    });
    const writable = await fileHandle.createWritable();
    try{
      let received = 0;
      if(!resp.body){
        const blob = await resp.blob();
        await writable.write(blob);
        await writable.close();
        transferProgress.value = 100; transferPercent.textContent = 'Fertig';
        return;
      }
      const reader = resp.body.getReader();
      if(!hasTotal){ transferProgress.removeAttribute('value'); }
      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        await writable.write(value);
        received += value.length;
        if(hasTotal){
          const pct = Math.min(100, Math.round((received/total)*100));
          transferProgress.value = pct;
          transferPercent.textContent = 'Download: ' + humanSize(received) + ' / ' + humanSize(total) + ' (' + pct + ' %)';
        } else {
          transferPercent.textContent = 'Download: ' + humanSize(received);
        }
        if((received & ((1<<20)-1)) === 0) await yieldFrame();
      }
      await writable.close();
      transferProgress.value = 100; transferPercent.textContent = 'Fertig';
    }catch(e){
      try{ await writable.abort(); }catch(_){}
      throw e;
    }
  }

  async function readToBlobAndSave(resp, filename){
    const total = parseInt(resp.headers.get('Content-Length') || '0', 10);
    const hasTotal = total > 0;
    if(!resp.body){
      const blob = await resp.blob();
      await yieldFrame();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 500);
      transferProgress.value = 100; transferPercent.textContent = 'Fertig';
      return;
    }
    const reader = resp.body.getReader();
    const chunks = [];
    let received = 0;
    if(!hasTotal){ transferProgress.removeAttribute('value'); }
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      chunks.push(value);
      received += value.length;
      if(hasTotal){
        const pct = Math.min(100, Math.round((received/total)*100));
        transferProgress.value = pct;
        transferPercent.textContent = 'Download: ' + humanSize(received) + ' / ' + humanSize(total) + ' (' + pct + ' %)';
      } else {
        transferPercent.textContent = 'Download: ' + humanSize(received);
      }
      if((received & ((1<<20)-1)) === 0) await yieldFrame();
    }
    await yieldFrame();
    const blob = new Blob(chunks);
    chunks.length = 0;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 500);
    transferProgress.max = 100; transferProgress.value = 100; transferPercent.textContent = 'Fertig';
  }

  function getFilenameFromDisposition(contentDisposition){
    if(!contentDisposition) return null;
    let m = contentDisposition.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
    if(m && m[1]){
      try { return decodeURIComponent(m[1]); } catch(e){ }
    }
    m = contentDisposition.match(/filename\s*=\s*"([^"]+)"/i);
    if(m && m[1]) return m[1];
    m = contentDisposition.match(/filename\s*=\s*([^;]+)/i);
    if(m && m[1]) return m[1].trim();
    return null;
  }

  async function startDownload(relpath, isDir, includeRoot){
    if(activeTransfer) return toast('Transfer aktiv', 'err', 1800);
    setBusy(true, 'Starte Download...');
    try{
      const url =
        '/download?path=' + encodeURIComponent(relpath || '') +
        (typeof includeRoot === 'boolean'
          ? ('&includeRoot=' + (includeRoot ? '1' : '0'))
          : '');
      const resp = await fetch(url);
      if(!resp.ok){
        const j = await resp.json().catch(()=> ({}));
        toast(j.message || 'Download fehlgeschlagen', 'error');
        return;
      }
      const cd = resp.headers.get('Content-Disposition') || '';
      const filename = getFilenameFromDisposition(cd) || (isDir ? 'download.zip' : 'download.bin');

      if(hasFSA()){
        await streamToFile(resp, filename);
      } else {
        await readToBlobAndSave(resp, filename);
      }
    }catch(e){
      toast('Fehler beim Download', 'error');
      console.error(e);
    } finally {
      setTimeout(()=>setBusy(false), 50);
    }
  }

  async function startZipAndDownload(relDirPath, includeRoot){
    if(activeTransfer) return toast('Transfer aktiv', 'err', 1800);
    setBusy(true, 'ZIP wird vorbereitet...');
    try{
      const start = await fetch(
        '/zip_start?path=' + encodeURIComponent(relDirPath || '') +
        '&includeRoot=' + (includeRoot ? '1' : '0')
      );
      if(!start.ok){
        await startDownload(relDirPath, true, includeRoot);
        return;
      }
      const js = await start.json();
      if(!js || !js.task_id){
        await startDownload(relDirPath, true, includeRoot);
        return;
      }
      const taskId = js.task_id;
      const fileNameHint = js.filename || null;
      currentTask = {type:'zip', id:taskId};

      transferProgress.max = 100;
      while(true){
        await new Promise(r => setTimeout(r, 250));
        const r = await fetch('/zip_status?task=' + encodeURIComponent(taskId));
        if(!r.ok){
          transferPercent.textContent = 'Fehler beim Status';
          break;
        }
        const j = await r.json().catch(()=>({}));
        const bt = j.bytes_total || 0;
        const bd = j.bytes_done || 0;
        const total = j.total || 0;
        const done = j.done || 0;
        const state = j.state || 'unknown';

        if(bt > 0){
          const pct = Math.min(100, Math.round((bd/bt)*100));
          transferProgress.value = pct;
          transferPercent.textContent = 'ZIP: ' + humanSize(bd) + ' / ' + humanSize(bt) + ' (' + pct + ' %)';
        } else if (total > 0) {
          const pct = Math.min(100, Math.round((done/total)*100));
          transferProgress.value = pct;
          transferPercent.textContent = 'ZIP: ' + pct + ' %';
        } else {
          transferProgress.removeAttribute('value');
          transferPercent.textContent = 'Berechne Größe ...';
        }

        if(state === 'done'){
          transferProgress.value = 100;
          transferPercent.textContent = 'ZIP fertig – starte Download...';
          break;
        } else if(state === 'error' || state === 'canceled'){
          transferPercent.textContent = (j && j.message) ? j.message : 'ZIP fehlgeschlagen/abgebrochen';
          toast(transferPercent.textContent, 'error');
          setBusy(false);
          return;
        }
      }
      transferProgress.value = 0;
      transferPercent.textContent = 'Lade ZIP...';
      const resp = await fetch('/zip_get?task=' + encodeURIComponent(taskId));
      if(!resp.ok){
        const t = await resp.text().catch(()=> '');
        toast('ZIP-Download fehlgeschlagen' + (t ? (': ' + t) : ''), 'error');
        return;
      }
      const cd = resp.headers.get('Content-Disposition') || '';
      const filename = getFilenameFromDisposition(cd) || fileNameHint || 'download.zip';

      if(hasFSA()){
        await streamToFile(resp, filename);
      } else {
        await readToBlobAndSave(resp, filename);
      }

    }catch(e){
      toast('Fehler beim ZIP-Download', 'error');
      console.error(e);
    } finally {
      setTimeout(()=>setBusy(false), 50);
    }
  }

  function showZipChoice(file){
    pendingZipFile = file;
    zipDialog.style.display = 'flex';
  }
  function hideZipChoice(){
    zipDialog.style.display = 'none';
  }

  function startUpload(file, unpackFlag){
    if(activeTransfer){ toast('Transfer aktiv', 'err', 1800); return; }
    if(!file){ toast('Bitte eine Datei auswählen', 'err', 1800); return; }

    setBusy(true, 'Upload läuft...');
    transferProgress.max = 100;
    transferProgress.value = 0;
    transferPercent.textContent = '';

    const form = new FormData(); form.append('file', file, file.name);
    if(typeof unpackFlag === 'boolean'){
      form.append('unpack', unpackFlag ? '1' : '0');
    }
    const xhr = new XMLHttpRequest();
    const useAsyncUnpack = (typeof unpackFlag === 'boolean' && unpackFlag === true);
    xhr.open('POST', '/upload?path=' + encodeURIComponent(currentPath || '') + (useAsyncUnpack ? '&async=1' : ''), true);

    xhr.upload.onprogress = e => {
      if(e.lengthComputable){
        const pct = Math.round((e.loaded / e.total) * 100);
        transferProgress.value = pct;
        transferPercent.textContent = 'Upload: ' + humanSize(e.loaded) + ' / ' + humanSize(e.total) + ' (' + pct + ' %)';
      } else {
        transferProgress.removeAttribute('value');
        transferPercent.textContent = 'Upload: ' + humanSize(e.loaded);
      }
    };

    xhr.onload = async () => {
      try{
        const ok = xhr.status >= 200 && xhr.status < 300;
        let res = {};
        try { res = JSON.parse(xhr.responseText || '{}'); } catch(_){}
        if(ok){
          if(res && res.task_id){
            currentTask = {type:'unzip', id:res.task_id};
            await pollUnzip(res.task_id, 'Entpacke...');
            await loadPath(currentPath);
            toast('Upload entpackt', 'ok', 1800);
          } else {
            if(res && res.message) toast(res.message, 'ok', 2200);
            await loadPath(currentPath);
          }
        } else {
          toast((res && res.message) ? ('Upload fehlgeschlagen: ' + res.message) : ('Upload fehlgeschlagen: ' + xhr.status), 'error');
        }
      }catch(e){
        console.error(e);
      } finally {
        setTimeout(()=>setBusy(false), 50);
      }
    };

    xhr.onerror = () => {
      try{ toast('Netzwerkfehler', 'error'); }
      finally {
        setBusy(false);
      }
    };

    xhr.send(form);
  }

  async function unzipAsync(relZipPath){
    setBusy(true, 'Starte Entpacken...');
    try{
      const start = await fetch('/unzip_start?path=' + encodeURIComponent(relZipPath));
      if(!start.ok){
        const resp = await fetch('/unzip?path=' + encodeURIComponent(relZipPath));
        const ok = resp.ok;
        const j = await resp.json().catch(async () => ({message: await resp.text()}));
        toast((j && j.message) ? j.message : (ok ? 'Entpackt' : 'Entpacken fehlgeschlagen'), ok ? 'ok' : 'error');
        await loadPath(currentPath);
        return;
      }
      const js = await start.json();
      if(!js || !js.task_id){
        toast('Konnte Entpacken nicht starten', 'error');
        return;
      }
      currentTask = {type:'unzip', id:js.task_id};
      await pollUnzip(js.task_id, 'Entpacke...');
      await loadPath(currentPath);
    } finally {
      setBusy(false);
    }
  }

  async function pollUnzip(taskId, label){
    transferProgress.max = 100;
    transferProgress.value = 0;
    transferPercent.textContent = label || 'Entpacke...';

    while(true){
      await new Promise(r => setTimeout(r, 250));
      const r = await fetch('/unzip_status?task=' + encodeURIComponent(taskId));
      if(!r.ok){
        transferPercent.textContent = 'Fehler beim Status';
        break;
      }
      const j = await r.json().catch(()=>({}));
      const bt = j.bytes_total || 0;
      const bd = j.bytes_done || 0;
      const total = j.total || 0;
      const done = j.done || 0;
      const state = j.state || 'unknown';

      if(bt > 0){
        const pct = Math.min(100, Math.round((bd/bt)*100));
        transferProgress.value = pct;
        transferPercent.textContent = (label || 'Entpacke...') + ' ' + humanSize(bd) + ' / ' + humanSize(bt) + ' (' + pct + ' %)';
      } else if (total > 0) {
        const pct = Math.min(100, Math.round((done/total)*100));
        transferProgress.value = pct;
        transferPercent.textContent = (label || 'Entpacke...') + ' ' + pct + ' %';
      } else {
        transferProgress.removeAttribute('value');
        transferPercent.textContent = 'Berechne Größe ...';
      }

      if(state === 'done'){
        transferProgress.value = 100;
        transferPercent.textContent = 'Entpacken fertig';
        if(j && j.message) toast(j.message, 'ok', 2200);
        break;
      } else if(state === 'error' || state === 'canceled'){
        if(j && j.message) toast(j.message, 'error');
        else toast('Entpacken abgebrochen/Fehler', 'error');
        break;
      }
    }
  }

    transferProgress.value = 0;
    transferPercent.textContent = 'Kopiere...';

    while(true){
      await new Promise(r => setTimeout(r, 250));

        transferPercent.textContent = 'Fehler beim Status';
        break;
      }
      const j = await r.json().catch(()=>({}));
      const bt = j.bytes_total || 0;
      const bd = j.bytes_done || 0;
      const total = j.total || 0;
      const done = j.done || 0;
      const state = j.state || 'unknown';

      if(bt > 0){
        const pct = Math.min(100, Math.round((bd/bt)*100));
        transferProgress.value = pct;
        transferPercent.textContent = 'Kopiere: ' + humanSize(bd) + ' / ' + humanSize(bt) + ' (' + pct + ' %)';
      } else if (total > 0) {
        const pct = Math.min(100, Math.round((done/total)*100));
        transferProgress.value = pct;
        transferPercent.textContent = 'Kopiere: ' + pct + ' %';
      } else {
        transferProgress.removeAttribute('value');
        transferPercent.textContent = 'Berechne Größe ...';
      }

      if(state === 'done'){
        transferProgress.value = 100;
        transferPercent.textContent = 'Fertig';
        if(j && j.message) toast(j.message, 'ok', 2200);

      } else if(state === 'error' || state === 'canceled'){
        if(j && j.message) toast(j.message, 'error');
        else toast(state === 'error' ? 'Fehler' : 'Abgebrochen', 'error');
        break;
      }

  }

  async function pollDelete(taskId){
    transferProgress.max = 100;
    transferProgress.value = 0;
    transferPercent.textContent = 'Lösche...';

    while(true){
      await new Promise(r => setTimeout(r, 250));
      const r = await fetch('/deletecontents_status?task=' + encodeURIComponent(taskId));
      if(!r.ok){
        transferPercent.textContent = 'Fehler beim Status';
        break;
      }
      const j = await r.json().catch(()=>({}));
      const bt = j.bytes_total || 0;
      const bd = j.bytes_done || 0;
      const total = j.total || 0;
      const done = j.done || 0;
      const state = j.state || 'unknown';

      if(bt > 0){
        const pct = Math.min(100, Math.round((bd/bt)*100));
        transferProgress.value = pct;
        transferPercent.textContent = 'Löschen: ' + humanSize(bd) + ' / ' + humanSize(bt) + ' (' + pct + ' %)';
      } else if (total > 0) {
        const pct = Math.min(100, Math.round((done/total)*100));
        transferProgress.value = pct;
        transferPercent.textContent = 'Löschen: ' + pct + ' %';
      } else {
        transferProgress.removeAttribute('value');
        transferPercent.textContent = 'Berechne Größe ...';
      }

      if(state === 'done'){
        transferProgress.value = 100;
        transferPercent.textContent = 'Löschen fertig';
        if(j && j.message) toast(j.message, 'ok', 2200);
        break;
      } else if(state === 'error' || state === 'canceled'){
        if(j && j.message) toast(j.message, 'error');
        else toast(state === 'error' ? 'Fehler' : 'Abgebrochen', 'error');
        break;
      }
    }
  }

  cancelBtn.onclick = async () => {
    if(!currentTask) return;
    try{
      if(currentTask.type === 'copy'){
        await fetch('/copy_cancel?task=' + encodeURIComponent(currentTask.id));
      } else if(currentTask.type === 'unzip'){
        await fetch('/unzip_cancel?task=' + encodeURIComponent(currentTask.id));
      } else if(currentTask.type === 'zip'){
        await fetch('/zip_cancel?task=' + encodeURIComponent(currentTask.id));
      } else if(currentTask.type === 'delete'){
        await fetch('/deletecontents_cancel?task=' + encodeURIComponent(currentTask.id));
      }
      toast('Abbruch angefordert', 'ok', 1500);
    }catch(e){
      console.error('cancel failed', e);
    }
  };

  uploadBtn.onclick = () => {
    if(activeTransfer){ toast('Transfer aktiv', 'err', 1800); return; }
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '*/*';
    inp.style.position = 'fixed';
    inp.style.left = '-9999px';
    document.body.appendChild(inp);
    inp.onchange = () => {
      const f = inp.files && inp.files[0];
      if(f){
        if(f.name.toLowerCase().endsWith('.zip')) showZipChoice(f);
        else startUpload(f, false);
      }
      setTimeout(()=>inp.remove(), 0);
    };
    inp.click();
  };

  zipChoiceUnpack.onclick = () => {
    if(pendingZipFile){ startUpload(pendingZipFile, true); }
    pendingZipFile = null;
    hideZipChoice();
  };
  zipChoiceOnly.onclick = () => {
    if(pendingZipFile){ startUpload(pendingZipFile, false); }
    pendingZipFile = null;
    hideZipChoice();
  };
  zipChoiceCancel.onclick = () => {
    pendingZipFile = null;
    hideZipChoice();
  };

  rootAndroid.onclick = async () => { await fetch('/setroot?root=Android'); await loadInfo(); await loadClip(); loadPath(''); };
  rootKodi.onclick = async () => { await fetch('/setroot?root=Kodi'); await loadInfo(); await loadClip(); loadPath(''); };

  quitBtn.onclick = async () => {
    try{
      const r = await fetch('/quit');
      if(r.ok) toast('Kodi wird beendet...', 'ok', 2500);
      else toast('Quit fehlgeschlagen', 'error');
    }catch(e){
      toast('Fehler bei Quit', 'error');
      console.error(e);
    }
  };

  appinfoBtn.onclick = async () => {
    try{
      const r = await fetch('/appinfo');
      if(r.ok){
        const j = await r.json().catch(()=>({}));
        toast((j && j.message) ? j.message : 'App-Info geöffnet', 'ok', 2200);
      } else {
        const t = await r.text().catch(()=> '');
        toast('App-Info öffnen fehlgeschlagen' + (t ? (': ' + t) : ''), 'error');
      }
    }catch(e){
      toast('Fehler beim Öffnen der App-Info', 'error');
      console.error(e);
    }
  };

  closeServerBtn.onclick = async () => {
    if(activeTransfer) return toast('Transfer aktiv', 'err', 1800);
    try{
      const resp = await fetch('/shutdown');
      if(resp.ok){
        toast('Server wird beendet...', 'ok', 2500);
        document.querySelectorAll('.btn').forEach(b => { b.disabled = true; });
      } else {
        toast('Server konnte nicht beendet werden', 'error');
      }
    }catch(e){
      toast('Fehler beim Beenden des Servers', 'error');
      console.error(e);
    }
  };

  pasteBtn.onclick = async () => {
    if(pasteBtn.disabled) return;
    try{
      setBusy(true, 'Füge ein...');
      const start = await fetch('/paste_start?path=' + encodeURIComponent(currentPath || ''));
      if(!start.ok){
        const r = await fetch('/paste?path=' + encodeURIComponent(currentPath || ''));
        const ok = r.ok;
        const j = await r.json().catch(async () => ({message: await r.text()}));
        toast((j && j.message) ? j.message : (ok ? 'Fertig' : 'Einfügen fehlgeschlagen'), ok ? 'ok' : 'error');
        await loadPath(currentPath);
        await loadClip();
        setBusy(false);
        return;
      }
      const j = await start.json().catch(()=> ({}));
      if(!j || !j.task_id){
        toast('Konnte Einfügen nicht starten.', 'error');
        setBusy(false);
        return;
      }
      currentTask = {type:'copy', id:j.task_id};
      await pollCopy(j.task_id);
      await loadPath(currentPath);
      await loadClip();
    }catch(e){
      toast('Fehler beim Einfügen', 'error');
      console.error(e);
    }finally{
      setBusy(false);
    }
  };

  zipNoRootBtn.onclick = () => {
    if(activeTransfer) return toast('Transfer aktiv', 'err', 1800);
    if(!confirm('Dieses Verzeichnis als ZIP (ohne Hauptordner) herunterladen?\n' + (currentPath || '/'))) return;
    startZipAndDownload(currentPath || '', false);
  };

  clearDirBtn.onclick = async () => {
    if(activeTransfer) return toast('Transfer aktiv', 'err', 1800);
    const label = (currentRootName === 'Kodi' ? 'Kodi Root' : 'Android Root') + ': ' + (currentPath || '/');
    if(!confirm('Wirklich den gesamten Inhalt von "' + label + '" löschen?\nDer Ordner selbst bleibt erhalten.')) return;
    setBusy(true, 'Berechne Größe ...');
    try{
      const start = await fetch('/deletecontents_start?path=' + encodeURIComponent(currentPath || ''));
      if(start.ok){
        const j = await start.json().catch(()=>({}));
        if(j && j.task_id){
          currentTask = {type:'delete', id:j.task_id};
          await pollDelete(j.task_id);
          await loadPath(currentPath);
          setBusy(false);
          return;
        }
      }
      const resp = await fetch('/deletecontents?path=' + encodeURIComponent(currentPath || ''));
      const j = await resp.json().catch(()=>({}));
      if(resp.ok){
        toast(j && j.message ? j.message : 'Inhalt gelöscht', 'ok', 2500);
        await loadPath(currentPath);
      } else {
        toast(j && j.message ? j.message : 'Löschen fehlgeschlagen', 'error');
      }
    }catch(e){
      toast('Fehler beim Löschen', 'error');
      console.error(e);
    }finally{
      setBusy(false);
    }
  };

  await loadInfo();
  await loadClip();
  await loadPath('');
})();
</script>
