<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Anmeldung · Kodi Android Web File Explorer © André Albus</title>
<style>
:root{
  --bg:#eef1f5;
  --card:#ffffff;
  --muted:#6b6b6b;
  --border:#d9dce1;
  --accent:#1e88e5;
  --accent-dark:#166fbe;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.title{
  font-size:22px;
  font-weight:600;
  margin-bottom:22px;
  color:var(--accent);
  text-align:center;
  letter-spacing:0.2px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 22px;
  width:min(420px,92vw);
  box-shadow:
    0 4px 12px rgba(0,0,0,.06),
    0 1px 3px rgba(0,0,0,.04);
  animation:fadeIn .35s ease-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

h1{
  font-size:19px;
  margin:0 0 12px;
  font-weight:600;
  color:#222;
}

label{
  display:block;
  font-size:13px;
  margin:14px 0 6px;
  color:var(--muted);
}

input[type=text],
input[type=password]{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:15px;
  background:#fafafa;
  transition:border .2s, background .2s;
}

input:focus{
  border-color:var(--accent);
  background:#fff;
  outline:none;
}

.btn{
  margin-top:18px;
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:background .2s, transform .1s;
}

.btn:hover{
  background:var(--accent-dark);
}

.btn:active{
  transform:scale(.98);
}

.info{
  font-size:12px;
  color:var(--muted);
  margin-top:12px;
  text-align:center;
}

.err{
  color:#c0392b;
  font-size:14px;
  margin:8px 0;
  font-weight:500;
}
</style>
</head>
<body>

  <h2 class="title">Kodi Android Web File Explorer © André Albus</h2>

  <form class="card" method="POST" action="" autocomplete="on" id="loginForm">
    <h1>Anmelden</h1>
    <div id="err" class="err" style="display:none;">Anmeldung fehlgeschlagen</div>

    <label for="username">Benutzername</label>
    <input id="username" name="username" type="text"
           autocomplete="username"
           required />

    <label for="password">Passwort</label>
    <input id="password" name="password" type="password"
           autocomplete="current-password"
           required />

    <button class="btn" type="submit">Login</button>
    <div class="info">Bitte Zugangsdaten eingeben.</div>
  </form>

<script>
(function(){
  try{
    const params = new URLSearchParams(location.search || '');
    const next = params.get('next') || '';
    const err = params.get('err');

    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('err');

    if(err === '1'){
      errBox.style.display = 'block';
    }

    form.action = '/login' + (next ? ('?next=' + encodeURIComponent(next)) : '');
  }catch(e){
    console.error('Login init error:', e);
  }
})();
</script>

</body>
</html>
